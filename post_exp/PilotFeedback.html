{% extends "post_exp/Page.html" %}
{% block content %}

<style>
    .btn-secondary {
        margin: 5px;
        color: #fff;
        background-color: #6c757d;
        border-color: #6c757d;
    }

    .btn-secondary.active {
        margin: 5px;
        color: #fff;
        background-color: blue;
        border-color: #6c757d;
    }

    input.sd-btn.sd-navigation__next-btn {
        background: blue !important;
        color: white;
    }

    .sv-components-column {
        display: block;
        flex-direction: column;
        background: white;
    }

    .sv_main .sv-action__content > * {
        background: blue;
        color: white;
    }

    input.sd-btn.sd-btn--action.sd-navigation__complete-btn {
        background: blue;
        color: white;
    }

    label.sd-rating__item.sd-rating__item--selected.sd-rating__item--fixed-size {
        background: blue;
    }

    h3.sd-title {
        color: blue !important;
    }

    .sd-item--checked .sd-item__decorator {
        background: blue !important;
    }
</style>
<div id="surveyContainer"></div>
<script>
    const surveyJSON = {
        "title": "Final questions (pilot feedback)",
        "showCompletedPage": false,
        "completeText": "Next",
        "pages": [
            {
                "name": "pilot_feedback",
                "elements": [
                    {
                        "type": "rating",
                        "name": "pilot_difficulty",
                        "title": "How difficult was the trading task overall?",
                        "isRequired": true,
                        "rateCount": 7,
                        "rateMax": 7,
                        "minRateDescription": "Very easy",
                        "maxRateDescription": "Very difficult"
                    },
                    {
                        "type": "rating",
                        "name": "pilot_instruction_clarity",
                        "title": "How clear were the instructions?",
                        "isRequired": true,
                        "rateCount": 7,
                        "rateMax": 7,
                        "minRateDescription": "Not clear at all",
                        "maxRateDescription": "Very clear"
                    },
                    {
                        "type": "comment",
                        "name": "pilot_unclear_open",
                        "title": "Was anything unclear or confusing? If nothing was unclear, please type \"Nothing was unclear.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 3
                            }
                        ]
                    },
                    {
                        "type": "rating",
                        "name": "pilot_payoff_understanding",
                        "title": "How well did you understand how your payment was calculated?",
                        "isRequired": true,
                        "rateCount": 7,
                        "rateMax": 7,
                        "minRateDescription": "Not at all",
                        "maxRateDescription": "Completely"
                    },
                    {
                        "type": "rating",
                        "name": "pilot_interface_clarity",
                        "title": "On the decision screen, how clear was what you were supposed to enter (investment amount, yes/no assessment, forecast)?",
                        "isRequired": true,
                        "rateCount": 7,
                        "rateMax": 7,
                        "minRateDescription": "Not clear at all",
                        "maxRateDescription": "Very clear"
                    },
                    {
                        "type": "radiogroup",
                        "name": "pilot_tech_issues",
                        "title": "Did you experience any technical problems (slow loading, buttons not working, graph not showing, errors)?",
                        "isRequired": true,
                        "choices": [
                            "No",
                            "Yes"
                        ]
                    },
                    {
                        "type": "comment",
                        "name": "pilot_tech_issues_desc",
                        "title": "Please describe any technical issues. If you had no issues, please type \"No issues.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 3
                            }
                        ]
                    },
                    {
                        "type": "comment",
                        "name": "pilot_flow_unsure_steps",
                        "title": "Thinking about the whole study from start to finish, where (if anywhere) did you feel unsure what to do next? If you were never unsure, please type \"I was never unsure.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 3
                            }
                        ]
                    },
                    {
                        "type": "comment",
                        "name": "pilot_one_change",
                        "title": "If you could change one thing to make the study easier to follow, what would it be? If you would not change anything, please type \"No changes.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 3
                            }
                        ]
                    },
                    {
                        "type": "comment",
                        "name": "pilot_surprises_mismatch",
                        "title": "Was anything different from what you expected at any point (instructions, screens, feedback, payment)? If nothing differed, please type \"Nothing differed.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 3
                            }
                        ]
                    },
                    {
                        "type": "comment",
                        "name": "pilot_missing_info",
                        "title": "Is there any information you wish you had been given earlier (or more clearly) before making decisions? If not, please type \"No.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 1
                            }
                        ]
                    },
                    {
                        "type": "comment",
                        "name": "pilot_confusing_wording",
                        "title": "Were there any words, phrases, or labels that felt unclear or misleading? If not, please type \"No.\"",
                        "isRequired": true,
                        "validators": [
                            {
                                "type": "text",
                                "minLength": 1
                            }
                        ]
                    }
                ]
            }
        ]
    };

    const survey = new Survey.Model(surveyJSON);

    survey.applyTheme(SurveyTheme.LayeredLightPanelless);
    survey.onComplete.add(function (result) {
        const surveyResults = JSON.stringify(result.data);
        console.log("Survey Results: ", surveyResults);
        document.getElementById('surveyResults').value = surveyResults;
        $('#form').submit();
    });

    Survey.StylesManager.applyTheme("bootstrap");
    $("#surveyContainer").Survey({model: survey});
</script>
<input type="hidden" id="surveyResults" name="surveyResults" value="">

{% endblock %}
